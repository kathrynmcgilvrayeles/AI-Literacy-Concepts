<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Understanding AI in L&D</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: '#1f2a52',
                        teal: '#00bec7',
                        lightteal: '#d2f0f0',
                        silver: '#abb5bf'
                    }
                }
            }
        }
    </script>
    <style>
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .tab-content-fade { animation: tabFadeIn 0.3s ease-out; }
        @keyframes tabFadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="min-h-screen flex flex-col bg-gray-50 text-gray-800">

    <header class="bg-navy text-white py-4 px-4 shadow-md">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
            <div>
                <h1 class="text-xl md:text-2xl font-bold mb-1">Understanding AI in L&D</h1>
                <p class="text-silver text-xs md:text-sm max-w-xl">Click or tap on each tab to reveal the key concepts.</p>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-6xl mx-auto w-full px-4 py-4 md:py-6">
        
        <!-- SECTION 1: Exploration (Tabs) -->
        <section id="explore-section" class="mb-12 w-full max-w-6xl mx-auto">
            <div class="bg-white rounded-xl shadow-md overflow-hidden border border-gray-200 flex flex-col md:flex-row">
                <!-- Tabs Header (Left Nav on Desktop) -->
                <div id="tabs-header" class="flex md:flex-col border-b md:border-b-0 md:border-r border-gray-200 bg-gray-50 md:w-[280px] lg:w-[320px] overflow-x-auto [scrollbar-width:none] [&::-webkit-scrollbar]:hidden shrink-0" role="tablist">
                    <!-- Tabs will be injected here -->
                </div>
                
                <!-- Tab Content Area -->
                <div id="tab-content-container" class="flex-1 p-5 md:p-8 min-h-[300px] bg-white">
                    <!-- Content injected here -->
                </div>
            </div>
        </section>

    </main>

    <script>
        // Content Data
        const contentData = [
            {
                id: 'card1',
                title: 'Understanding AI Literacy',
                icon: '<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path></svg>',
                text: 'AI literacy is the set of skills needed to critically evaluate and effectively use AI technologies.<br><br>Generative AI is still relatively new. Because of this, the frameworks and definitions we use to understand it will continue to evolve over time.'
            },
            {
                id: 'card2',
                title: 'Mastering the Prompt',
                icon: '<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>',
                text: 'Interaction relies on the system, the user, and the prompt. For the best results:<br><br><ul class="list-disc pl-5 space-y-1"><li>Give clear instructions</li><li>Assign a persona</li><li>Iteration is key to getting a better output result.</li></ul>'
            },
            {
                id: 'card3',
                title: 'Transforming L&D Environments',
                icon: '<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>',
                text: 'AI is fundamentally shifting L&D from a "one-size-fits-all" approach to highly personalised experiences.<br><br><ul class="list-disc pl-5 space-y-2"><li>Adaptive learning platforms analyse performance in real-time, adjusting difficulty to bridge specific knowledge gaps.</li><li>AI assists in rapid prototyping of course outlines, generating microlearning modules, and translating materials.</li><li>By automating admin tasks like scheduling and tracking, L&D professionals can focus on strategic coaching and human-centric mentoring.</li></ul>'
            },
            {
                id: 'card4',
                title: 'Navigating Ethics & Risks',
                icon: '<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>',
                text: 'Beware of <strong>"hallucinations"</strong> (inaccurate/misleading outputs).<br><br>Ethical use requires: addressing bias, understanding transparency issues (the "black box"), and strictly maintaining privacy and <strong>confidentiality</strong>. <br><br>Unless using an approved enterprise license with secure data boundaries, <span class="text-red-600 font-semibold">NEVER</span> use learner names, confidential company data, or Personally Identifiable Information (PII). Always follow your organisation\'s AI governance policies to ensure compliance and mitigate risks. Human oversight is critical.'
            },
            {
                id: 'card5',
                title: 'Driving Successful Adoption',
                icon: '<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>',
                text: 'Adoption works best when people feel confident enough to experiment. <strong>Cultivating a sense of curiosity is essential, as this is what truly drives innovation and experimentation.</strong><br><br>AI should be built directly into daily workflows rather than treated as a separate project. The tools must be easy to use and have access to the organisation\'s specific context and data.'
            }
        ];

        // DOM Elements
        const tabsHeader = document.getElementById('tabs-header');
        const tabContentContainer = document.getElementById('tab-content-container');

        // State variables
        let activeTabId = contentData[0].id;
        const viewedTabs = new Set([activeTabId]);

        function renderTabs() {
            tabsHeader.innerHTML = '';
            
            contentData.forEach((data) => {
                const isActive = data.id === activeTabId;
                
                const baseClasses = 'shrink-0 w-auto md:w-full py-3.5 md:py-4 px-4 md:px-5 text-sm md:text-base text-left transition-all focus:outline-none flex items-center justify-between gap-3 whitespace-nowrap md:whitespace-normal border-b-2 md:border-b-0 md:border-l-4';
                const activeClasses = 'bg-white text-teal border-teal font-bold shadow-sm md:shadow-none z-10';
                const inactiveClasses = 'bg-transparent text-navy border-transparent hover:bg-gray-200/60 hover:text-teal font-medium z-0';
                
                const isViewed = viewedTabs.has(data.id);
                
                // Checkmark for viewed tabs
                const checkIcon = isViewed ? `<svg class="w-5 h-5 text-green-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>` : '';
                
                const tabBtn = document.createElement('button');
                tabBtn.className = `${baseClasses} ${isActive ? activeClasses : inactiveClasses}`;
                tabBtn.setAttribute('role', 'tab');
                tabBtn.setAttribute('aria-selected', isActive);
                tabBtn.onclick = () => switchTab(data.id);
                
                tabBtn.innerHTML = `<span class="flex-1">${data.title}</span> ${checkIcon}`;
                tabsHeader.appendChild(tabBtn);
            });
            
            renderTabContent();
        }

        function renderTabContent() {
            const data = contentData.find(d => d.id === activeTabId);
            if (!data) return;
            
            tabContentContainer.innerHTML = `
                <div class="tab-content-fade flex flex-col md:flex-row gap-4 md:gap-6 items-start">
                    <div class="bg-lightteal text-teal p-3 md:p-4 rounded-2xl shadow-sm shrink-0">
                        ${data.icon.replace('w-6 h-6', 'w-8 h-8')}
                    </div>
                    <div>
                        <h3 class="text-lg md:text-xl font-bold text-navy mb-2">${data.title}</h3>
                        <div class="text-gray-700 text-sm md:text-base leading-relaxed">${data.text}</div>
                    </div>
                </div>
            `;
        }

        function switchTab(tabId) {
            activeTabId = tabId;
            viewedTabs.add(tabId);
            renderTabs();
        }

        // Initialize
        renderTabs();

    </script>
</body>
</html>
